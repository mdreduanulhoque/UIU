<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Practice problem</title>
</head>
<body>
    <table border="1px" cellpadding="7px" width="900px" style="text-align: center;" >
        <tr style="font-weight: bold; background-color: rgb(222, 221, 221);">
            <td>Student</td>
            <td>Week 1</td>
            <td>Week 2</td>
            <td>Remarks</td>
        </tr>

        <tr>
            <td style="text-align: left;">Anika Rahman</td>
            <td>Present</td>
            <td>Present</td>
            <td>Good progress this term.</td>
        </tr>

        <tr>
            <td style="text-align: left;">Rafiul Islam</td>
            <td colspan="2">Absent (Medical Leave)</td>
            <td>Submit certificate.</td>
        </tr>

        <tr>
            <td rowspan="2" style="text-align: left;">Group: Section B</td>
            <td>Present</td>
            <td>Present</td>
            <td>On track</td>
        </tr>

        <tr>
            <td>Present</td>
            <td>Absent</td>
            <td>Follow up needed</td>
        </tr>
    </table>
</body>
</html>
