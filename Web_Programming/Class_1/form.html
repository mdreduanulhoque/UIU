<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form>
        <fieldset style="background-color: rgb(240, 233, 223);">
            <legend style="background-color: rgb(245, 253, 89);"><b>Personal Form</b></legend>
            Name: <input type="text" placeholder="Siuuuuuuuuu"> <br><br>
            Date of Birth: <input type="date"> <br><br>
            Gender:
            <label><input type="radio" name="gender" value="male">Male</label>
            <label><input type="radio" name="gender" value="female">Female</label>
            <label><input type="radio" name="gender" value="others">Others</label> <br><br>
            Father's name: <input type="text"> <br><br>
            Mother's name: <input type="text"> <br><br>
            Address: <input type="text"> <br><br>
            Education Background:
            <select>
                <option>Choose One</option>
                <option>Science</option>
                <option>Arts</option>
                <option>Commerce</option>
                <option>Others</option>
            </select> <br><br>
            Mobile: <input type="number" maxlength="11" minlength="11"> <br><br>
            Email: <input type="email"> <br><br>
            Password: <input type="password" minlength="5"> <br><br>
        </fieldset>
        <br>
        <fieldset style="background-color: rgb(243, 219, 240);">
            <legend style="background-color: rgb(245, 253, 89);"><b>Preferences</b></legend>
            Color: <input type="color"> <br><br>
            Volume: <input type="range" min="0" max="20" step="2"> <br><br>
            Operating System:
            <label><input type="checkbox" name="OS" value="windows">Windows</label>
            <label><input type="checkbox" name="OS" value="mac">Mac</label>
            <label><input type="checkbox" name="OS" value="linux">Linux</label> <br><br>
        </fieldset>
        <br>
        <button
            style="background-color: chartreuse; width: 100px; height: 50px; font-size: large;"><b>Submit</b></button>
    </form>
</body>

</html>
