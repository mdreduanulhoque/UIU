<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Table</title>
</head>

<body>

    <table border="1px" cellpadding="4px" cellspacing="5px" height="200" width="200"
        style="border-collapse: collapse; text-align: center;">
        <tr style="text-align: right;">
            <td>C1</td>
            <td>C2</td>
            <td>C3</td>
            <td>C4</td>
        </tr>

        <tr>
            <td colspan="3" style="background-color:rgb(222, 109, 109); color:aliceblue; vertical-align:top;"><b>Yellow</b></td>
            <td>C2</td>
        </tr>

        <tr>
            <td colspan="2" rowspan="2" style="background-color: chartreuse; color:crimson;"><b>Black</b></td>
            <td rowspan="2" style="background-color:burlywood; vertical-align: bottom;"><b>Pink</b></td>
            <td>C4</td>
        </tr>

        <tr>
            <td>C1</td>
        </tr>
    </table>

</body>

</html>
